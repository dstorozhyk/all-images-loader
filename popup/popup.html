<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Images Loader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="header__title">All Images Loader</h1>
      <button id="themeToggle" class="btn-icon" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <span id="imageCount" class="toolbar__count">Scanning...</span>
      <div class="toolbar__actions">
        <button id="selectAll" class="btn-text" disabled>Select All</button>
        <button id="deselectAll" class="btn-text" disabled>Deselect All</button>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <select id="typeFilter" class="filter-select">
        <option value="all">All types</option>
        <option value="img">Images</option>
        <option value="css-bg">Backgrounds</option>
        <option value="meta">Meta / OG</option>
        <option value="svg">SVG</option>
        <option value="other">Other</option>
      </select>
      <select id="sizeFilter" class="filter-select">
        <option value="all">All sizes</option>
        <option value="large">Large (>500px)</option>
        <option value="medium">Medium (100-500px)</option>
        <option value="small">Small (<100px)</option>
      </select>
    </div>

    <!-- Image Grid -->
    <div id="imageGrid" class="grid">
      <div class="grid__empty" id="emptyState">
        <div class="spinner" id="spinner"></div>
        <p id="emptyText">Scanning page for images...</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <button id="downloadBtn" class="btn-primary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span id="downloadText">Download Selected</span>
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
